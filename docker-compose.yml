services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ams_app
    restart: unless-stopped
    environment:
      - DATABASE_URL=sqlite:////app/data/embeddings.db
      - FACEAPP_PROVIDERS=CPUExecutionProvider
      - FACEAPP_DET_SIZE=512
      - OMP_NUM_THREADS=2
      - OPENBLAS_NUM_THREADS=2
    ports:
      - "53732:8000"
    volumes:
      - app_data:/app/data
      - app_uploads:/app/static/uploads
      - insightface_cache:/root/.insightface
    networks:
      - ams_monitoring

  prometheus:
    image: prom/prometheus:latest
    container_name: ams_prometheus
    restart: unless-stopped
    ports:
      - "53746:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/alert-rules.yml:/etc/prometheus/alert-rules.yml:ro
    depends_on:
      - app
      - cadvisor
      - alertmanager
    networks:
      - ams_monitoring

  alertmanager:
    image: prom/alertmanager:latest
    container_name: ams_alertmanager
    restart: unless-stopped
    command:
      - --config.file=/etc/alertmanager/alertmanager.yml
    ports:
      - "53761:9093"
    volumes:
      - ./monitoring/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    networks:
      - ams_monitoring

  grafana:
    image: grafana/grafana:latest
    container_name: ams_grafana
    restart: unless-stopped
    ports:
      - "53753:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin123
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning/datasources/datasource.yml:/etc/grafana/provisioning/datasources/datasource.yml:ro
    depends_on:
      - prometheus
    networks:
      - ams_monitoring

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: ams_cadvisor
    restart: unless-stopped
    ports:
      - "18080:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:rw
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    networks:
      - ams_monitoring

networks:
  ams_monitoring:

volumes:
  grafana_data:
  app_data:
  app_uploads:
  insightface_cache:
