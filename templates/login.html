<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AI-Powered Face Recognition-Based Attendance Management System with Full-Stack Integration</title>
  <link rel="icon" href="/static/ams-login-logo.png?v=1" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root{
      --bg:#fff6f2;
      --card:#ffffff;
      --shadow: 0 14px 40px rgba(20, 20, 40, .16);
      --text:#535353;
      --muted:#6b7280;
      --border:#e5e7eb;
      --orange:#f47a20;
      --orange2:#ff9c42;
      --field:#fbefea;
      --field2:#eaf1ff;
      --danger:#dc2626;
      --radius: 14px;
    }

    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      font-family: Poppins, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .page{
      min-height:100vh;
      display:grid;
      grid-template-columns: 1fr;
      align-items:start;
      padding: 32px 20px;
    }

    .topbar{
      max-width: 1180px;
      margin: 0 auto 26px;
      width: 100%;
      display:flex;
      align-items:center;
      gap:18px;
    }

    .logoCircle{
      width: 92px;
      height: 92px;
      border-radius: 999px;
      background: #fbf1f1;
      border: 1px solid rgba(0,0,0,.10);
      box-shadow: 0 10px 18px rgba(0,0,0,.10);
      display:grid;
      place-items:center;
      overflow:hidden;
      flex: 0 0 auto;
    }
    .logoCircle img{
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
      transform: scale(1.08);
      display:block;
    }

    .badge{
      width: 54px;
      height: 54px;
      border-radius: 999px;
      background:
        radial-gradient(circle at 32% 32%, rgba(255,255,255,.85), rgba(255,255,255,0) 55%),
        conic-gradient(from 215deg, #111827, #111827 12%, var(--orange), var(--orange2), #111827);
      box-shadow: 0 8px 18px rgba(0,0,0,.18);
      border: 3px solid #fff;
    }

    .brand{
      display:flex;
      align-items:center;
      gap:22px;
      flex-wrap:wrap;
    }
    .brandText{
      display:flex;
      flex-direction:column;
      line-height:1.04;
      text-transform: uppercase;
      color:#111;
    }
    .brandTop{
      font-size: 13px;
      font-weight: 700;
      letter-spacing: .14em;
    }
    .brandDivider{
      width: 100%;
      height: 1px;
      background: rgba(244,122,32,.95);
      margin: 8px 0 7px;
    }
    .brandBottom{
      font-size: 16px;
      font-weight: 600;
      letter-spacing: .08em;
    }

    /* Modern Typography Styling */
    .main-heading {
      font-family: 'Poppins', sans-serif;
      font-size: 28px;
      font-weight: 300; /* thinner */
      letter-spacing: 6px; /* key part for spaced effect */
      color: #333;
      text-transform: uppercase;
      margin: 0 0 10px 0;
      line-height: 1.2;
      text-rendering: optimizeLegibility;
      -webkit-font-smoothing: antialiased;
      font-variant-ligatures: no-common-ligatures;
      position: relative;
      padding-bottom: 12px;
    }

    .main-heading::after {
      content: "";
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 2px;
      background: #f57c00; /* orange from your theme */
      border-radius: 1px;
    }

    .sub-heading {
      font-family: 'Poppins', sans-serif;
      font-size: 18px;
      font-weight: 300; /* thinner */
      letter-spacing: 2px;
      color: #555;
      text-transform: uppercase;
      margin: 0;
      position: relative;
      display: inline-block;
      line-height: 1.3;
      text-rendering: optimizeLegibility;
      -webkit-font-smoothing: antialiased;
      font-variant-ligatures: no-common-ligatures;
    }

    .wrap{
      max-width: 1180px;
      margin: 0 auto;
      width: 100%;
      display:grid;
      grid-template-columns: 1fr;
      gap: 44px;
      align-items:start;
    }

    @media (max-width: 980px){
      .wrap{grid-template-columns: 1fr; gap: 22px}
    }

    .layout{
      display:grid;
      grid-template-columns: auto 1fr;
      gap: 44px;
      align-items:start;
    }
    @media (max-width: 980px){
      .layout{grid-template-columns: 1fr}
    }

    .spacer{min-height: 520px;}

    /* Form container (requested specs) */
    .form-section{
      background: var(--card);
      border-radius: 18px;
      box-shadow: var(--shadow);
      border: 1px solid rgba(0,0,0,.05);
      width: 495px;
      min-height: 520px;
      margin: 0px 86.6667px;
      padding: 40px;
      color: var(--text);
    }
    @media (max-width: 980px){
      .form-section{margin: 0 auto; width: min(495px, 100%); height: auto}
    }

    .titleRow{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap: 12px;
      margin: 4px 0 18px;
    }
    .titleRow h1{
      margin: 0;
      font-size: 28px;
      font-weight: 800;
      letter-spacing: .2px;
      color: #111;
    }

    .row{
      display:grid;
      grid-template-columns: 1fr;
      gap: 14px;
    }

    .selectRow{display:flex; gap: 12px; align-items:center; flex-wrap:wrap}
    @media (max-width: 520px){
      .selectRow{grid-template-columns: 1fr}
    }

    .control{
      position: relative;
    }

    label{
      display:block;
      font-size: 13px;
      font-weight: 600;
      margin: 8px 0 6px;
      color: #111;
    }

    .sr-only{
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    select, input{
      width: 100%;
      height: 52px;
      border-radius: 12px;
      border: 1px solid var(--border);
      padding: 0 44px 0 16px;
      outline: none;
      font-size: 15px;
      background: var(--field);
      color: #111;
    }
    select:focus, input:focus{
      border-color: rgba(244, 122, 32, .65);
      box-shadow: 0 0 0 3px rgba(244, 122, 32, .18);
    }
    .roleSelect{
      width: 280px;
      max-width: 100%;
      background: #fff7f4;
    }

    .captchaRow{
      display:grid;
      grid-template-columns: 1fr 220px;
      gap: 12px;
      align-items:center;
    }
    @media (max-width: 520px){
      .captchaRow{grid-template-columns: 1fr}
    }

    .captchaImg{
      height: 52px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: #f2f3f5;
      display:flex;
      align-items:center;
      justify-content:center;
      position: relative;
      overflow:hidden;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      letter-spacing: 4px;
      font-weight: 900;
      color: #111827;
      user-select:none;
    }
    .captchaImg:before{
      content:"";
      position:absolute;
      inset:0;
      background:
        repeating-linear-gradient(0deg, rgba(0,0,0,.08), rgba(0,0,0,.08) 1px, transparent 1px, transparent 7px),
        repeating-linear-gradient(90deg, rgba(0,0,0,.05), rgba(0,0,0,.05) 1px, transparent 1px, transparent 9px);
      opacity:.35;
    }
    .captchaImg span{position:relative; transform: skewX(-8deg)}

    .refresh{
      position:absolute;
      right: 8px;
      top: 50%;
      transform: translateY(-50%);
      width: 34px;
      height: 34px;
      border-radius: 10px;
      display:grid;
      place-items:center;
      text-decoration:none;
      padding: 0;
      cursor: pointer;
      outline: none;
      color: inherit;
      font: inherit;
      background: rgba(255,255,255,.65);
      border: 1px solid rgba(0,0,0,.08);
    }
    .refresh:hover{background: rgba(255,255,255,.9)}

    .fieldBlue{ background: var(--field2); }

    select{
      appearance: none;
      background-image:
        linear-gradient(45deg, transparent 50%, #374151 50%),
        linear-gradient(135deg, #374151 50%, transparent 50%);
      background-position:
        calc(100% - 22px) 22px,
        calc(100% - 16px) 22px;
      background-size: 6px 6px;
      background-repeat: no-repeat;
      padding-right: 36px;
    }

    .icon{
      position:absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      width: 18px;
      height: 18px;
      opacity: .75;
      pointer-events: none;
    }

    .eyeBtn{
      position:absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
      width: 34px;
      height: 34px;
      border: none;
      background: transparent;
      cursor: pointer;
      display:grid;
      place-items:center;
      border-radius: 10px;
    }
    .eyeBtn:hover{background: rgba(0,0,0,.04)}

    .help{
      margin-top: 10px;
      color: var(--muted);
      font-size: 14px;
      text-align:center;
    }

    .btn{
      margin-top: 10px;
      width: 100%;
      height: 52px;
      border-radius: 12px;
      border: none;
      cursor:pointer;
      font-weight: 800;
      font-size: 15px;
      color: white;
      background: linear-gradient(180deg, var(--orange2), var(--orange));
      box-shadow: 0 10px 18px rgba(244, 122, 32, .25);
    }
    .btn:focus-visible{
      outline: 3px solid rgba(244, 122, 32, .35);
      outline-offset: 2px;
    }
    .btn:active{transform: translateY(1px)}

    .forgot{
      display:block;
      text-align:center;
      margin-top: 10px;
      color: #374151;
      text-decoration:none;
      font-weight: 650;
    }
    .forgot:hover{text-decoration:underline}

    .error{
      margin: 0 0 14px;
      padding: 12px 12px;
      border-radius: 12px;
      border: 1px solid rgba(220,38,38,.22);
      background: rgba(220,38,38,.06);
      color: var(--danger);
      font-weight: 650;
      font-size: 14px;
    }
    .notice{
      margin: 0 0 14px;
      padding: 12px 12px;
      border-radius: 12px;
      border: 1px solid rgba(22,163,74,.22);
      background: rgba(22,163,74,.06);
      color: #15803d;
      font-weight: 650;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="topbar">
      <div class="logoCircle" aria-label="AMS logo">
        <img src="/static/ams-login-logo.png?v=1" alt="AMS" />
      </div>
      <div class="brand">
        <div>
          <h1 class="main-heading">AI-Powered Face Recognition-Based</h1>
          <h2 class="sub-heading">Attendance Management System with Full-Stack Integration</h2>
        </div>
      </div>
    </div>

    <div class="wrap">
      <div class="layout">
        <section class="form-section" aria-label="Login form">
          <div class="titleRow">
            <h1>Log in</h1>
            <select class="roleSelect" name="role" form="loginForm" aria-label="Role" required>
              <option value="Admin">Admin</option>
              <option value="Faculty">Faculty</option>
              <option value="Trainer">Trainer</option>
              <option value="Security">Security</option>
            </select>
          </div>

        {% if msg %}
          <div class="notice">{{ msg }}</div>
        {% endif %}
        {% if error %}
          <div class="error">{{ error }}</div>
        {% endif %}

        <form id="loginForm" method="post" action="/login" class="row" role="form" autocomplete="off">

          <div class="control">
            <label class="sr-only" for="user_id">User ID</label>
            <input id="user_id" name="user_id" type="text" placeholder="12219626" autocomplete="off" autocapitalize="off" spellcheck="false" required />
            <svg class="icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
              <path d="M12 12a4 4 0 1 0-4-4 4 4 0 0 0 4 4Z" stroke="#111827" stroke-width="1.6"/>
              <path d="M4 20a8 8 0 0 1 16 0" stroke="#111827" stroke-width="1.6" stroke-linecap="round"/>
            </svg>
          </div>

          <div class="control">
            <label class="sr-only" for="pwd">Password</label>
            <input id="pwd" class="fieldBlue" name="password" type="password" placeholder="••••••••" autocomplete="new-password" required />
            <button class="eyeBtn" type="button" aria-label="Toggle password" onclick="togglePwd()">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                <path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7S2 12 2 12Z" stroke="#111827" stroke-width="1.6"/>
                <path d="M12 15a3 3 0 1 0-3-3 3 3 0 0 0 3 3Z" stroke="#111827" stroke-width="1.6"/>
              </svg>
            </button>
          </div>

          <div class="captchaRow">
            <div class="control">
              <label class="sr-only" for="captcha">Captcha</label>
              <input id="captcha" name="captcha" type="text" placeholder="Enter captcha" inputmode="text" autocomplete="off" autocapitalize="off" autocorrect="off" spellcheck="false" required />
            </div>
            <div class="captchaImg" aria-label="Captcha">
              <span>{{ captcha_code or '' }}</span>
              <button class="refresh" type="button" title="Refresh captcha" aria-label="Refresh captcha" onclick="window.location.href='/login'">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                  <path d="M20 12a8 8 0 1 1-2.34-5.66" stroke="#111827" stroke-width="1.6" stroke-linecap="round"/>
                  <path d="M20 4v6h-6" stroke="#111827" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
              </button>
            </div>
          </div>

          <button class="btn" type="submit">Login</button>


        </form>
        </section>

        <div class="spacer" aria-hidden="true"></div>
      </div>
    </div>
  </div>

  <script>
    function togglePwd(){
      const el = document.getElementById('pwd');
      if (!el) return;
      el.type = el.type === 'password' ? 'text' : 'password';
    }
  </script>
</body>
</html>
