apiVersion: v1
kind: Namespace
metadata:
  name: faceapp
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: faceapp-config
  namespace: faceapp
data:
  DATABASE_URL: sqlite:////app/data/embeddings.db
  FACEAPP_PROVIDERS: CPUExecutionProvider
  FACEAPP_MODEL_NAME: buffalo_s
  FACEAPP_ALLOWED_MODULES: detection,recognition
  FACEAPP_DET_SIZE: "320"
  OMP_NUM_THREADS: "4"
  OPENBLAS_NUM_THREADS: "4"
  FACEAPP_EMBED_CACHE_TTL_SECONDS: "300"
  FACEAPP_ADMIN_ID: "1234"
---
apiVersion: v1
kind: Secret
metadata:
  name: faceapp-secret
  namespace: faceapp
type: Opaque
stringData:
  FACEAPP_ADMIN_PASSWORD: "5678"
  FACEAPP_SESSION_SECRET: "change-this-before-production"
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: faceapp-data
  namespace: faceapp
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: faceapp-uploads
  namespace: faceapp
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: faceapp-model-cache
  namespace: faceapp
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 4Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: faceapp
  namespace: faceapp
spec:
  replicas: 1
  revisionHistoryLimit: 2
  minReadySeconds: 5
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: faceapp
  template:
    metadata:
      labels:
        app: faceapp
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: app
          # Replace with your pushed image if cluster cannot access local Docker images.
          image: faceapp:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: faceapp-config
            - secretRef:
                name: faceapp-secret
          resources:
            requests:
              cpu: "1"
              memory: 768Mi
            limits:
              cpu: "4"
              memory: 1536Mi
          startupProbe:
            httpGet:
              path: /metrics
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 18
          readinessProbe:
            httpGet:
              path: /metrics
              port: 8000
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 2
            successThreshold: 1
            failureThreshold: 1
          livenessProbe:
            httpGet:
              path: /metrics
              port: 8000
            initialDelaySeconds: 40
            periodSeconds: 20
            timeoutSeconds: 2
            failureThreshold: 3
          volumeMounts:
            - name: data
              mountPath: /app/data
            - name: uploads
              mountPath: /app/static/uploads
            - name: model-cache
              mountPath: /root/.insightface
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: faceapp-data
        - name: uploads
          persistentVolumeClaim:
            claimName: faceapp-uploads
        - name: model-cache
          persistentVolumeClaim:
            claimName: faceapp-model-cache
---
apiVersion: v1
kind: Service
metadata:
  name: faceapp
  namespace: faceapp
spec:
  selector:
    app: faceapp
  ports:
    - port: 8000
      targetPort: 8000
      nodePort: 30007
      protocol: TCP
  type: NodePort
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: faceapp-hpa
  namespace: faceapp
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: faceapp
  minReplicas: 1
  # Keep this low with SQLite backend to reduce DB lock contention.
  maxReplicas: 2
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 0
      selectPolicy: Max
      policies:
        - type: Percent
          value: 100
          periodSeconds: 60
        - type: Pods
          value: 1
          periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 60
      selectPolicy: Min
      policies:
        - type: Percent
          value: 50
          periodSeconds: 60
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 75
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: faceapp
data:
  prometheus.yml: |
    global:
      scrape_interval: 5s
      evaluation_interval: 5s

    rule_files:
      - /etc/prometheus/alert-rules.yml

    alerting:
      alertmanagers:
        - static_configs:
            - targets: ["alertmanager:9093"]

    scrape_configs:
      - job_name: faceapp
        metrics_path: /metrics
        static_configs:
          - targets: ["faceapp:8000"]

      - job_name: prometheus
        static_configs:
          - targets: ["localhost:9090"]

      - job_name: alertmanager
        static_configs:
          - targets: ["alertmanager:9093"]

  alert-rules.yml: |
    groups:
      - name: faceapp_availability
        rules:
          - alert: FaceAppDown
            expr: up{job="faceapp"} == 0
            for: 20s
            labels:
              severity: critical
            annotations:
              summary: "FaceApp is down"
              description: "Prometheus has failed to scrape FaceApp for 20 seconds."
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: alertmanager-config
  namespace: faceapp
data:
  alertmanager.yml: |
    global:
      resolve_timeout: 5m

    route:
      receiver: default
      group_by: ["alertname"]
      group_wait: 10s
      group_interval: 30s
      repeat_interval: 5m

    receivers:
      - name: default
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-provisioning
  namespace: faceapp
data:
  datasource.yml: |
    apiVersion: 1
    datasources:
      - name: prometheus
        type: prometheus
        access: proxy
        url: http://prometheus:9090
        isDefault: true
        editable: true
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: alertmanager
  namespace: faceapp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: alertmanager
  template:
    metadata:
      labels:
        app: alertmanager
    spec:
      containers:
        - name: alertmanager
          image: prom/alertmanager:latest
          args:
            - --config.file=/etc/alertmanager/alertmanager.yml
          ports:
            - containerPort: 9093
          readinessProbe:
            httpGet:
              path: /-/ready
              port: 9093
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /-/ready
              port: 9093
            initialDelaySeconds: 15
            periodSeconds: 20
          volumeMounts:
            - name: alertmanager-config
              mountPath: /etc/alertmanager/alertmanager.yml
              subPath: alertmanager.yml
      volumes:
        - name: alertmanager-config
          configMap:
            name: alertmanager-config
---
apiVersion: v1
kind: Service
metadata:
  name: alertmanager
  namespace: faceapp
spec:
  selector:
    app: alertmanager
  ports:
    - port: 9093
      targetPort: 9093
      nodePort: 30093
      protocol: TCP
  type: NodePort
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: faceapp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      labels:
        app: prometheus
    spec:
      containers:
        - name: prometheus
          image: prom/prometheus:latest
          args:
            - --config.file=/etc/prometheus/prometheus.yml
          ports:
            - containerPort: 9090
          readinessProbe:
            httpGet:
              path: /-/ready
              port: 9090
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /-/ready
              port: 9090
            initialDelaySeconds: 15
            periodSeconds: 20
          volumeMounts:
            - name: prometheus-config
              mountPath: /etc/prometheus/prometheus.yml
              subPath: prometheus.yml
            - name: prometheus-config
              mountPath: /etc/prometheus/alert-rules.yml
              subPath: alert-rules.yml
      volumes:
        - name: prometheus-config
          configMap:
            name: prometheus-config
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: faceapp
spec:
  selector:
    app: prometheus
  ports:
    - port: 9090
      targetPort: 9090
      nodePort: 30090
      protocol: TCP
  type: NodePort
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: faceapp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      containers:
        - name: grafana
          image: grafana/grafana:latest
          env:
            - name: GF_SECURITY_ADMIN_USER
              value: admin
            - name: GF_SECURITY_ADMIN_PASSWORD
              value: admin123
          ports:
            - containerPort: 3000
          volumeMounts:
            - name: grafana-provisioning
              mountPath: /etc/grafana/provisioning/datasources/datasource.yml
              subPath: datasource.yml
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 20
      volumes:
        - name: grafana-provisioning
          configMap:
            name: grafana-provisioning
---
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: faceapp
spec:
  selector:
    app: grafana
  ports:
    - port: 3000
      targetPort: 3000
      nodePort: 30030
      protocol: TCP
  type: NodePort

