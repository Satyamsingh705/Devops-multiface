groups:
  - name: ams_alerts
    rules:
      - alert: AppHighCpuUsage
        expr: (sum(rate(container_cpu_usage_seconds_total[1m])) 
              / sum(machine_cpu_cores)) * 100 > 75
        for: 10s
        labels:
          severity: warning
        annotations:
          summary: "AMS app CPU usage is above 75%"
          description: "AMS app CPU has been above 75% for 10 seconds. Current value: {{ $value }}%"